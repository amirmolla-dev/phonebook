{% extends "base.html" %}

{% block title %}
دفتر تلفن
{% endblock %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

    <h2>دفتر تلفن</h2>
    <form method="get" class="mb-3">

    <div class="input-group">

        <input
            type="text"
            name="q"
            class="form-control"
            placeholder="جستجو بر اساس نام یا شماره همراه"
            value="{{ request.GET.q }}"
        >

        <button
            type="submit"
            class="btn btn-primary">

            جستجو

        </button>

    </div>

</form>

    <a href="/create/"
       class="btn btn-primary">

        افزودن مخاطب

    </a>

</div>

<table class="table table-bordered table-hover">

    <thead>

    <tr>

        <th>نام</th>

        <th>شماره همراه</th>

        <th>عملیات</th>

    </tr>

    </thead>

    <tbody>

    {% for contact in contacts %}

    <tr>

        <td>{{ contact.full_name }}</td>

        <td>{{ contact.mobile }}</td>

        <td>

            <a href="/edit/{{ contact.id }}/"
               class="btn btn-warning btn-sm">

                ویرایش

            </a>

            <a href="/delete/{{ contact.id }}/"
               class="btn btn-danger btn-sm">

                حذف

            </a>

        </td>

    </tr>

    {% empty %}

    <tr>

        <td colspan="3">

            هیچ مخاطبی ثبت نشده است.

        </td>

    </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
