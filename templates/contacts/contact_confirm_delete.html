{% extends "base.html" %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h3>

            حذف مخاطب

        </h3>

        <p>

            آیا از حذف

            <strong>

                {{ object.full_name }}

            </strong>

            مطمئن هستید؟

        </p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">

                حذف

            </button>

            <a href="/"
               class="btn btn-secondary">

                انصراف

            </a>

        </form>

    </div>

</div>

{% endblock %}
